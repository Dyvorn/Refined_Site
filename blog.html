<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Refined</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="config.js"></script>
    <script>
        (async function() {
            // Protection check
            let isEarlyAccess = false;
            try { isEarlyAccess = localStorage.getItem('early_access') === 'true'; } catch(e) {}
            
            let launchTime = 0;
            try { launchTime = new Date(CONFIG.LAUNCH_DATE).getTime(); } catch(e) {}
            
            let localTime = new Date().getTime();
            let isLocallyLocked = launchTime && localTime < launchTime;
            
            if (!isEarlyAccess && (isLocallyLocked || !launchTime)) {
                document.documentElement.innerHTML = ''; document.documentElement.style.background = 'black';
                window.location.replace('index.html');
                return;
            }

            // Asynchronous server time check to catch system clock bypass
            if (!isEarlyAccess && launchTime) {
                try {
                    let response = await fetch(window.location.href, { method: 'HEAD', cache: 'no-store' });
                    let serverDateStr = response.headers.get('date');
                    if (serverDateStr) {
                        let serverTime = new Date(serverDateStr).getTime();
                        if (serverTime < launchTime) {
                            document.documentElement.innerHTML = ''; document.documentElement.style.background = 'black';
                            window.location.replace('index.html');
                        }
                    }
                } catch(e) {}
            }
        })();
    </script>
    <!-- Scroll Progress Bar -->
    <div id="progressBarContainer">
        <div id="progressBarFill"></div>
    </div>

    <!-- Header -->
    <header id="main-header">
        <div class="logo"><a href="home.html">Refined</a></div>
        <nav class="nav-links">
            <a href="home.html#home">Home</a>
            <a href="home.html#projects">Projects</a>
            <a href="home.html#youtube">YouTube</a>
            <a href="blog.html">Blog</a>
            <a href="home.html#contact" class="btn-nav">Contact</a>
        </nav>
        <button class="mobile-menu-btn" id="mobile-toggle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"></path></svg>
        </button>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
        <a href="home.html#home">Home</a>
        <a href="home.html#projects">Projects</a>
        <a href="home.html#youtube">YouTube</a>
        <a href="blog.html" class="text-accent font-bold">Blog</a>
        <a href="home.html#contact" class="text-accent font-bold">Contact</a>
    </div>

    <main class="container" style="padding-top: 10rem; min-height: 80vh;">
        <div class="blog-intro text-center mb-2 reveal">
            <h1 class="section-title" style="margin-bottom: 1rem;">Refined Blog</h1>
            <p class="text-muted" style="max-width: 600px; margin: 0 auto 4rem auto;">Dive into my latest articles, tutorials, and thoughts on web development and design.</p>
        </div>
        <div id="blog-list" class="wheel-container reveal">
            <p class="text-center text-muted pulse-text" style="width: 100%;">Loading posts...</p>
        </div>
    </main>

    <footer>
        <div class="container" style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
            <p>&copy; 2026 Refined. Built with precision and strict privacy standards.</p>
            <div style="display: flex; gap: 1.5rem; font-size: 0.9rem;">
                <a href="impressum.html" style="color: var(--text-muted); text-decoration: none;">Impressum</a>
                <a href="datenschutz.html" style="color: var(--text-muted); text-decoration: none;">Datenschutz</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="blog.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadBlogList);
    </script>
</body>
</html>
