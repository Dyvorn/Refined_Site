<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OG Image Generator</title>
    <style>
        body { background: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Courier New', Courier, monospace; }
        /* Precise OG dimensions */
        .og-canvas {
            width: 1200px;
            height: 630px;
            background: #050608;
            position: relative;
            overflow: hidden;
            color: #e5e5e5;
            border: 1px solid #222;
        }
        /* Geometric Grid Overlay */
        .grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 182, 6, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 182, 6, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .content {
            position: relative;
            z-index: 10;
            padding: 80px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .terminal-header { color: #ffb606; font-size: 1.2rem; margin-bottom: 2rem; letter-spacing: 0.2rem; }
        h1 {
            font-size: 5rem;
            margin: 0;
            background: linear-gradient(90deg, #ffb606, #b28228);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1.1;
            text-transform: uppercase;
        }
        .subtitle { font-size: 1.8rem; color: #a0a0a0; margin-top: 1rem; }
        .cta-container {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .cta-button {
            background: transparent;
            border: 2px solid #ffb606;
            color: #ffb606;
            padding: 1.5rem 3rem;
            font-size: 1.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }
        .url { color: #444; font-size: 1.2rem; }
        .accent-corner { position: absolute; bottom: 0; right: 0; width: 200px; height: 200px; background: radial-gradient(circle at bottom right, rgba(255, 182, 6, 0.1), transparent 70%); }
    </style>
</head>
<body>
    <div class="og-canvas">
        <div class="grid"></div>
        <div class="accent-corner"></div>
        <div class="content">
            <div class="terminal-header">[ SYSTEM STATUS: ONLINE ]</div>
            <h1>REFINED</h1>
            <div class="subtitle">Dev, Games & Cinematic Motion</div>
            <div style="color: #666; margin-top: 0.5rem; font-size: 1.2rem;">by Lennard Finn Penzler</div>
            
            <div class="cta-container">
                <div class="cta-button">→ View Portfolio</div>
                <div class="url">dyvorn.github.io/Refined_Site</div>
            </div>
        </div>
    </div>
</body>
</html>
