<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post | Refined</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .post-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 3rem;
            margin-top: 2rem;
            line-height: 1.8;
        }
        .post-content h1, .post-content h2, .post-content h3 {
            margin-top: 2rem;
            margin-bottom: 1rem;
        }
        .post-content p {
            margin-bottom: 1rem;
            color: var(--text-color);
        }
        .post-content a {
            color: var(--accent-color);
            text-decoration: underline;
        }
        .post-content code {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
        }
        .post-content pre {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--text-muted);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <script src="config.js"></script>
    <script>
        // Protection check
        const isEarlyAccess = localStorage.getItem('early_access') === 'true';
        if (!isEarlyAccess && new Date().getTime() < new Date(CONFIG.LAUNCH_DATE).getTime()) {
            window.location.replace('index.html');
        }
    </script>
    <!-- Scroll Progress Bar -->
    <div id="progressBarContainer">
        <div id="progressBarFill"></div>
    </div>

    <!-- Header -->
    <header id="main-header">
        <div class="logo"><a href="home.html">Refined</a></div>
        <nav class="nav-links">
            <a href="home.html#home">Home</a>
            <a href="home.html#projects">Projects</a>
            <a href="home.html#youtube">YouTube</a>
            <a href="blog.html">Blog</a>
        </nav>
        <button class="mobile-menu-btn" id="mobile-toggle">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"></path></svg>
        </button>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu" id="mobile-menu">
        <a href="home.html#home">Home</a>
        <a href="home.html#projects">Projects</a>
        <a href="home.html#youtube">YouTube</a>
        <a href="blog.html" style="color: var(--accent-color); font-weight: bold;">Blog</a>
    </div>

    <main class="container" style="padding-top: 10rem; min-height: 80vh;">
        <a href="blog.html" class="back-link reveal">&larr; Back to Articles</a>
        <div id="post-container" class="post-content hover-lift reveal" style="max-width: 900px; margin: 2rem auto;">
            <p style="text-align: center; color: var(--text-muted);">Loading post...</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Refined. Built with precision and strict privacy standards.</p>
        </div>
    </footer>

    <!-- Local Vendor Scripts for Privacy -->
    <script src="vendor/marked.min.js"></script>
    <script src="vendor/purify.min.js"></script>
    
    <script src="blog.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadPost);
    </script>
</body>
</html>
