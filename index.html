<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coming Soon | Refined</title>
    <meta name="description" content="The official website of the Refined YouTube channel is coming soon.">



    <link rel="stylesheet" href="style.css?v=4">
    <style>
        /* Force the overlay styling to take up the whole body and not be position fixed */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-color);
        }

        .countdown-overlay {
            position: relative;
            height: auto;
        }
    </style>
</head>

<body>
    <div id="countdown-overlay" class="countdown-overlay">
        <div class="countdown-content">
            <div class="logo" style="margin-bottom: 2rem; font-size: 2.5rem;">Refined</div>
            <h1 class="countdown-title">Something Big is Coming</h1>
            <p style="color: var(--text-muted); margin-bottom: 3rem;">We are launching in...</p>
            <div class="countdown-timer" style="margin-bottom: 2rem;">
                <div class="time-box">
                    <span class="time-number" id="cd-days">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="cd-hours">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="cd-minutes">00</span>
                    <span class="time-label">Minutes</span>
                </div>
                <div class="time-box">
                    <span class="time-number" id="cd-seconds">00</span>
                    <span class="time-label">Seconds</span>
                </div>
            </div>

            <div style="margin-top: 2rem; font-size: 0.9rem;">
                <a href="#" id="early-access-toggle" style="color: var(--text-muted); text-decoration: underline;">Early
                    Access</a>
                <div id="early-access-form" style="display: none; margin-top: 1rem;">
                    <input type="password" id="early-access-password" placeholder="Password"
                        style="background: rgba(0,0,0,0.3); border: 1px solid var(--card-border); color: white; padding: 0.5rem 1rem; border-radius: 8px; outline: none;">
                    <button id="early-access-submit"
                        style="background: var(--accent-color); color: var(--bg-color); border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; font-weight: bold; margin-left: 0.5rem;">Enter</button>
                </div>
            </div>

            <div style="margin-top: 3rem; display: flex; justify-content: center;">
                <a href="https://buymeacoffee.com/refined" target="_blank" rel="noopener noreferrer" style="color: #FFDD00; text-decoration: none; display: flex; align-items: center; gap: 0.5rem; font-weight: bold; background: rgba(255, 221, 0, 0.1); padding: 0.5rem 1.5rem; border-radius: 50px; border: 1px solid rgba(255, 221, 0, 0.3); transition: all 0.3s;" onmouseover="this.style.background='rgba(255, 221, 0, 0.2)'" onmouseout="this.style.background='rgba(255, 221, 0, 0.1)'">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
                    Buy Me a Coffee
                </a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="countdown.js"></script>
</body>

</html>
