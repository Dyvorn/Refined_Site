<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Redirecting...</title>
</head>
<body>
    <script src="/config.js"></script>
    <script>
        (async function() {
            let isEarlyAccess = false;
            try { isEarlyAccess = localStorage.getItem('early_access') === 'true'; } catch(e) {}
            
            let launchTime = 0;
            try { if (typeof CONFIG !== 'undefined') launchTime = new Date(CONFIG.LAUNCH_DATE).getTime(); } catch(e) {}
            
            let localTime = new Date().getTime();
            let isLocallyLocked = launchTime && localTime < launchTime;
            
            // Helper function to handle 404 redirect logic
            const doRedirect = (locked) => {
                if (!isEarlyAccess && locked) {
                    document.documentElement.innerHTML = ''; document.documentElement.style.background = 'black';
                    window.location.replace('/');
                } else {
                    window.location.replace('/');
                }
            };

            if (!isEarlyAccess && (isLocallyLocked || !launchTime)) {
                doRedirect(true);
                return;
            }

            if (!isEarlyAccess && launchTime) {
                try {
                    let response = await fetch(window.location.href, { method: 'HEAD', cache: 'no-store' });
                    let serverDateStr = response.headers.get('date');
                    if (serverDateStr) {
                        let serverTime = new Date(serverDateStr).getTime();
                        if (serverTime < launchTime) {
                            doRedirect(true);
                            return;
                        }
                    }
                } catch(e) {}
            }
            
            // If they reach here, they are unlocked
            doRedirect(false);
        })();
    </script>
</body>
</html>
